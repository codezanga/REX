<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>REX REALTYCO — Property Listings</title>
<link rel="icon" type="image/svg+xml" href="https://res.cloudinary.com/dvqgqgo4c/image/upload/v1773854552/Logo_SVG_s6giav.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Josefin+Sans:wght@300;400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#AA7C5B;
  --primary-dark:#8A6040;
  --primary-light:#C49A7A;
  --primary-dim:rgba(170,124,91,0.10);
  --primary-dim2:rgba(170,124,91,0.06);
  --bg:#FAF7F4;
  --bg-2:#F3EDE6;
  --bg-3:#EDE4DA;
  --white:#FFFFFF;
  --border:#E8DDD4;
  --border-2:#DDD0C4;
  --text:#2C1F14;
  --text-2:#6B4E38;
  --text-3:#A8896E;
  --text-4:#C4AA94;
  --sale:#2E9E6A;
  --rent:#2E7EA8;
  --sold:#C45A3A;
  --offer:#7A5AAA;
  --r:10px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Josefin Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 18px;
  display:flex;align-items:center;justify-content:space-between;
  height:62px;position:sticky;top:0;z-index:100;
  box-shadow:0 1px 20px rgba(170,124,91,0.08);
}
.logo-img{height:30px;width:auto;object-fit:contain;}
.header-right{display:flex;align-items:center;gap:10px;}
.h-pill{
  background:var(--primary-dim);
  border:1px solid var(--border);
  border-radius:20px;padding:5px 13px;
  font-size:10px;letter-spacing:1px;
  color:var(--text-3);
  display:flex;align-items:center;gap:6px;
}
.h-pill strong{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--primary);}
.sync-wrap{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:2px;color:var(--text-4);text-transform:uppercase;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--sale);animation:pulse 2s infinite;}
.sync-dot.syncing{background:var(--primary);border-radius:2px;animation:spin .8s linear infinite;}
.sync-dot.error{background:var(--sold);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* MAIN */
main{padding:22px 16px 100px;max-width:1200px;margin:0 auto;}

/* PAGE TOP */
.page-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--text);letter-spacing:1px;line-height:1;}
.page-title span{color:var(--primary);}
.btn-add{
  display:flex;align-items:center;gap:8px;
  background:var(--primary);color:var(--white);
  border:none;padding:12px 20px;border-radius:var(--r);
  font-family:'Josefin Sans',sans-serif;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;font-weight:600;transition:all .2s;
  white-space:nowrap;
  box-shadow:0 4px 18px rgba(170,124,91,0.30);
}
.btn-add:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(170,124,91,0.35);}
.btn-add:active{transform:translateY(0);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}}
.scard{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:var(--r);padding:16px 18px;
  position:relative;overflow:hidden;
  animation:fadeUp .5s ease both;
  box-shadow:0 2px 12px rgba(170,124,91,0.06);
}
.scard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.scard:nth-child(1)::after{background:var(--primary);}
.scard:nth-child(2)::after{background:var(--sale);}
.scard:nth-child(3)::after{background:var(--rent);}
.scard:nth-child(4)::after{background:var(--sold);}
.scard-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--text-4);margin-bottom:8px;}
.scard-val{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;line-height:1;}
.scard:nth-child(1) .scard-val{color:var(--primary);}
.scard:nth-child(2) .scard-val{color:var(--sale);}
.scard:nth-child(3) .scard-val{color:var(--rent);}
.scard:nth-child(4) .scard-val{color:var(--sold);}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4;}
.search-box{
  width:100%;background:var(--white);
  border:1px solid var(--border);border-radius:var(--r);
  padding:11px 14px 11px 38px;color:var(--text);
  font-family:'Josefin Sans',sans-serif;font-size:12px;letter-spacing:.5px;
  outline:none;transition:border-color .2s;
  box-shadow:0 1px 6px rgba(170,124,91,0.05);
}
.search-box::placeholder{color:var(--text-4);}
.search-box:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(170,124,91,0.1);}
.filter-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;flex-shrink:0;}
.filter-scroll::-webkit-scrollbar{display:none;}
.fbtn{
  background:var(--white);border:1px solid var(--border);
  color:var(--text-3);padding:10px 14px;border-radius:var(--r);
  font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.fbtn:hover,.fbtn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}
.fselect{
  background:var(--white);border:1px solid var(--border);
  color:var(--text-3);padding:10px 14px;border-radius:var(--r);
  font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;outline:none;-webkit-appearance:none;
}
.fselect:focus{border-color:var(--primary);}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:580px){.cards-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:960px){.cards-grid{grid-template-columns:repeat(3,1fr);}}

.pcard{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:14px;padding:20px;
  position:relative;overflow:hidden;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  animation:fadeUp .4s ease both;cursor:pointer;
  box-shadow:0 2px 14px rgba(170,124,91,0.07);
}
.pcard:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(170,124,91,0.15);border-color:var(--primary-light);}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-light));opacity:0;transition:opacity .25s;}
.pcard:hover::before{opacity:1;}

.pcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;}
.pcard-name{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.3;flex:1;}
.pcard-loc{font-size:10px;color:var(--text-4);letter-spacing:1px;margin-top:4px;display:flex;align-items:center;gap:4px;}
.pcard-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.pcard-price{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--primary);line-height:1;margin-bottom:3px;}
.pcard-period{font-size:9px;color:var(--text-4);letter-spacing:2px;text-transform:uppercase;}
.pcard-agent{display:flex;align-items:center;gap:5px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);font-size:10px;color:var(--text-3);letter-spacing:1px;}
.pcard-actions{display:flex;gap:7px;margin-top:12px;}
.btn-sm{flex:1;background:var(--bg-2);border:1px solid var(--border);color:var(--text-3);padding:9px 6px;border-radius:7px;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'Josefin Sans',sans-serif;text-align:center;}
.btn-sm:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}
.btn-sm.del:hover{border-color:var(--sold);color:var(--sold);background:rgba(196,90,58,0.06);}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:600;white-space:nowrap;}
.b-sale{background:rgba(46,158,106,.1);color:var(--sale);border:1px solid rgba(46,158,106,.2);}
.b-rent{background:rgba(46,126,168,.1);color:var(--rent);border:1px solid rgba(46,126,168,.2);}
.b-sold{background:rgba(196,90,58,.1);color:var(--sold);border:1px solid rgba(196,90,58,.2);}
.b-offer{background:rgba(122,90,170,.1);color:var(--offer);border:1px solid rgba(122,90,170,.2);}
.b-res{background:var(--primary-dim);color:var(--primary);border:1px solid rgba(170,124,91,.2);}
.b-com{background:rgba(46,126,168,.08);color:var(--rent);}
.b-land{background:rgba(46,158,106,.08);color:var(--sale);}
.b-sl{background:rgba(207,127,155,.08);color:#B86080;}
.b-meta{background:var(--bg-2);color:var(--text-4);border:1px solid var(--border);}

/* EMPTY/LOADING */
.state-box{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-4);}
.state-box p{font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-top:14px;}
.loader{display:inline-block;width:26px;height:26px;border:2px solid var(--border-2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(44,31,20,0.55);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.overlay.open{display:flex;}
@media(min-width:600px){.overlay{align-items:center;padding:20px;}}
.modal{background:var(--white);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:580px;max-height:93vh;overflow-y:auto;animation:slideUp .32s cubic-bezier(.32,0,.67,0);-webkit-overflow-scrolling:touch;box-shadow:0 -8px 40px rgba(170,124,91,0.15);}
@media(min-width:600px){.modal{border-radius:16px;animation:modalIn .28s ease;box-shadow:0 20px 60px rgba(44,31,20,0.2);}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.modal-handle{width:36px;height:4px;background:var(--border-2);border-radius:2px;margin:12px auto 0;}
@media(min-width:600px){.modal-handle{display:none;}}
.modal-head{padding:18px 20px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--text);}
.modal-close{background:var(--bg-2);border:1px solid var(--border);color:var(--text-3);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.modal-close:hover{border-color:var(--sold);color:var(--sold);}
.modal-body{padding:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:480px){.form-grid{grid-template-columns:1fr;}}
.fg-full{grid-column:1/-1;}
.fg{display:flex;flex-direction:column;gap:7px;}
label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--text-3);}
input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 13px;border-radius:8px;font-family:'Josefin Sans',sans-serif;font-size:13px;letter-spacing:.5px;outline:none;transition:all .2s;width:100%;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--primary);background:var(--white);box-shadow:0 0 0 3px rgba(170,124,91,0.1);}
input::placeholder,textarea::placeholder{color:var(--text-4);}
select option{background:var(--white);}
textarea{resize:vertical;min-height:75px;}
.modal-foot{padding:14px 20px 28px;display:flex;gap:10px;}
.btn-cancel{flex:1;background:var(--bg-2);border:1px solid var(--border);color:var(--text-3);padding:14px;border-radius:10px;font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{color:var(--text);border-color:var(--text-3);}
.btn-save{flex:2;background:var(--primary);border:none;color:var(--white);padding:14px;border-radius:10px;font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:600;transition:all .2s;box-shadow:0 4px 16px rgba(170,124,91,0.3);}
.btn-save:hover{background:var(--primary-dark);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
.drow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bg-2);font-size:12px;gap:12px;}
.drow:last-child{border-bottom:none;}
.dlabel{color:var(--text-4);letter-spacing:2px;font-size:8px;text-transform:uppercase;flex-shrink:0;}
.dval{color:var(--text);text-align:right;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--white);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:30px;font-size:10px;letter-spacing:2px;text-transform:uppercase;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(44,31,20,0.15);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:var(--sale);color:var(--sale);}
.toast.error{border-color:var(--sold);color:var(--sold);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}
</style>
</head>
<body>

<header>
  <img src="https://res.cloudinary.com/dvqgqgo4c/image/upload/v1773853343/REX_Brown_Logo_zwsavl.svg" class="logo-img" alt="REX">
  <div class="header-right">
    <div class="h-pill" id="hp-total" style="display:none">Listings <strong id="header-total">0</strong></div>
    <div class="sync-wrap"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Live</span></div>
  </div>
</header>

<main>
  <div class="page-top">
    <div class="page-title">Property <span>Listings</span></div>
    <button class="btn-add" onclick="openAdd()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Add Listing
    </button>
  </div>

  <div class="stats">
    <div class="scard" style="animation-delay:.05s"><div class="scard-label">Total</div><div class="scard-val" id="s-total">—</div></div>
    <div class="scard" style="animation-delay:.1s"><div class="scard-label">For Sale</div><div class="scard-val" id="s-sale">—</div></div>
    <div class="scard" style="animation-delay:.15s"><div class="scard-label">For Rent</div><div class="scard-val" id="s-rent">—</div></div>
    <div class="scard" style="animation-delay:.2s"><div class="scard-label">Closed</div><div class="scard-val" id="s-closed">—</div></div>
  </div>

  <div class="filters">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" viewBox="0 0 14 14"><circle cx="6" cy="6" r="4.5" stroke="#AA7C5B" stroke-width="1.4"/><path d="M9.5 9.5l3 3" stroke="#AA7C5B" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input class="search-box" type="text" placeholder="Search name, location, agent..." id="search" oninput="render()">
    </div>
    <div class="filter-scroll">
      <button class="fbtn active" onclick="setF('all',this)">All</button>
      <button class="fbtn" onclick="setF('For Sale',this)">For Sale</button>
      <button class="fbtn" onclick="setF('For Rent',this)">For Rent</button>
      <button class="fbtn" onclick="setF('Sold',this)">Sold</button>
      <button class="fbtn" onclick="setF('Under Offer',this)">Under Offer</button>
    </div>
    <select class="fselect" id="type-f" onchange="render()">
      <option value="all">All Types</option>
      <option value="Residential">Residential</option>
      <option value="Commercial">Commercial</option>
      <option value="Land">Land</option>
      <option value="Short Let">Short Let</option>
    </select>
  </div>

  <div class="cards-grid" id="cards">
    <div class="state-box"><div class="loader"></div><p>Loading listings</p></div>
  </div>
</main>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="m-add">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="m-title">Add Listing</div>
      <button class="modal-close" onclick="closeM('m-add')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="fg fg-full"><label>Property Name</label><input id="f-name" placeholder="e.g. Ugomma Duplex, Awka"></div>
        <div class="fg fg-full"><label>Location / Address</label><input id="f-loc" placeholder="e.g. Jahi, Abuja"></div>
        <div class="fg"><label>Type</label><select id="f-type"><option>Residential</option><option>Commercial</option><option>Land</option><option>Short Let</option></select></div>
        <div class="fg"><label>Status</label><select id="f-status"><option>For Sale</option><option>For Rent</option><option>Under Offer</option><option>Sold</option></select></div>
        <div class="fg"><label>Price (₦)</label><input id="f-price" placeholder="e.g. 85,000,000"></div>
        <div class="fg"><label>Period</label><select id="f-period"><option>Outright</option><option>Per Annum</option><option>Per Month</option><option>Per Night</option></select></div>
        <div class="fg"><label>Bedrooms</label><input id="f-beds" placeholder="e.g. 4 Bedrooms"></div>
        <div class="fg"><label>Size</label><input id="f-size" placeholder="e.g. 400sqm"></div>
        <div class="fg"><label>Agent Name</label><input id="f-agent" placeholder="e.g. Chisom Okafor"></div>
        <div class="fg"><label>Agent Phone</label><input id="f-phone" placeholder="e.g. 08012345678"></div>
        <div class="fg fg-full"><label>Notes</label><textarea id="f-notes" placeholder="Additional notes..."></textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeM('m-add')">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="save()">Save Listing</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="overlay" id="m-view">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="v-title">Details</div>
      <button class="modal-close" onclick="closeM('m-view')">✕</button>
    </div>
    <div class="modal-body" id="v-body"></div>
    <div class="modal-foot"><button class="btn-save" style="flex:1" onclick="closeM('m-view')">Close</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbwfZGPV6k3nBENtH9vvs87t8fNMs9_H7NfleaZS6X3Cz22VTF8EyD_4CY_sKmywKSYF/exec";
let data=[],editId=null,filter='all';

function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3000);}
function sync(s){const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');l.textContent=s==='syncing'?'Syncing...':s==='error'?'Offline':'Live';}

async function load(){
  sync('syncing');
  try{
    const r=await fetch(API),j=await r.json();
    if(j.success){
      data=j.data.filter(x=>x.ID).map(x=>({id:x.ID,name:x.Name,location:x.Location,type:x.Type,status:x.Status,price:x.Price,period:x.Period,beds:x.Beds,size:x.Size,agent:x.Agent,phone:x.Phone,notes:x.Notes,date:x.Date}));
      sync('live');render();
    }else throw new Error();
  }catch{sync('error');document.getElementById('cards').innerHTML='<div class="state-box"><p>Could not load — check connection</p></div>';toast('Connection error','error');}
}

async function callAPI(payload){sync('syncing');const r=await fetch(API,{method:'POST',body:JSON.stringify(payload)});const j=await r.json();sync(j.success?'live':'error');return j;}

const fmtDate=d=>{if(!d)return'—';const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});};
const sBadge=s=>{const m={'For Sale':'b-sale','For Rent':'b-rent','Sold':'b-sold','Under Offer':'b-offer'};return`<span class="badge ${m[s]||'b-sale'}">${s}</span>`;};
const tBadge=t=>{const m={'Residential':'b-res','Commercial':'b-com','Land':'b-land','Short Let':'b-sl'};return`<span class="badge ${m[t]||'b-res'}">${t}</span>`;};

function updateStats(){
  document.getElementById('s-total').textContent=data.length;
  document.getElementById('s-sale').textContent=data.filter(x=>x.status==='For Sale').length;
  document.getElementById('s-rent').textContent=data.filter(x=>x.status==='For Rent').length;
  document.getElementById('s-closed').textContent=data.filter(x=>x.status==='Sold'||x.status==='Under Offer').length;
  document.getElementById('header-total').textContent=data.length;
  if(data.length)document.getElementById('hp-total').style.display='flex';
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const tf=document.getElementById('type-f').value;
  return data.filter(l=>{
    const ms=filter==='all'||l.status===filter;
    const mt=tf==='all'||l.type===tf;
    const mq=!q||(l.name||'').toLowerCase().includes(q)||(l.location||'').toLowerCase().includes(q)||(l.agent||'').toLowerCase().includes(q);
    return ms&&mt&&mq;
  });
}

function setF(f,btn){filter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function render(){
  updateStats();
  const filtered=getFiltered();
  const grid=document.getElementById('cards');
  if(!filtered.length){grid.innerHTML=`<div class="state-box"><p>${data.length?'No listings match filters':'No listings yet — add your first one'}</p></div>`;return;}
  grid.innerHTML=filtered.map((l,i)=>`
    <div class="pcard" style="animation-delay:${i*.05}s" onclick="view('${l.id}')">
      <div class="pcard-top">
        <div style="flex:1">
          <div class="pcard-name">${l.name||'Unnamed Property'}</div>
          <div class="pcard-loc">
            <svg width="9" height="10" viewBox="0 0 10 12" fill="none"><path d="M5 1C3 1 1 2.8 1 5c0 3 4 7 4 7s4-4 4-7c0-2.2-2-4-4-4z" stroke="#C4AA94" stroke-width="1.2" fill="none"/><circle cx="5" cy="5" r="1.2" fill="#C4AA94"/></svg>
            ${l.location||'—'}
          </div>
        </div>
        ${sBadge(l.status)}
      </div>
      <div class="pcard-badges">${tBadge(l.type)}${l.beds?`<span class="badge b-meta">${l.beds}</span>`:''}${l.size?`<span class="badge b-meta">${l.size}</span>`:''}</div>
      <div class="pcard-price">₦${l.price||'—'}</div>
      <div class="pcard-period">${l.period||''}</div>
      ${l.agent?`<div class="pcard-agent"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="4" r="2.5" stroke="#A8896E" stroke-width="1.2"/><path d="M1.5 11c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="#A8896E" stroke-width="1.2" stroke-linecap="round"/></svg>${l.agent}</div>`:''}
      <div class="pcard-actions" onclick="event.stopPropagation()">
        <button class="btn-sm" onclick="view('${l.id}')">View</button>
        <button class="btn-sm" onclick="edit('${l.id}')">Edit</button>
        <button class="btn-sm del" onclick="del('${l.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function openAdd(){editId=null;document.getElementById('m-title').textContent='Add Listing';['name','loc','price','beds','size','agent','phone','notes'].forEach(f=>document.getElementById('f-'+f).value='');document.getElementById('f-type').value='Residential';document.getElementById('f-status').value='For Sale';document.getElementById('f-period').value='Outright';document.getElementById('m-add').classList.add('open');}

function edit(id){
  const l=data.find(x=>String(x.id)===String(id));if(!l)return;
  editId=id;document.getElementById('m-title').textContent='Edit Listing';
  document.getElementById('f-name').value=l.name||'';document.getElementById('f-loc').value=l.location||'';
  document.getElementById('f-type').value=l.type||'Residential';document.getElementById('f-status').value=l.status||'For Sale';
  document.getElementById('f-price').value=l.price||'';document.getElementById('f-period').value=l.period||'Outright';
  document.getElementById('f-beds').value=l.beds||'';document.getElementById('f-size').value=l.size||'';
  document.getElementById('f-agent').value=l.agent||'';document.getElementById('f-phone').value=l.phone||'';
  document.getElementById('f-notes').value=l.notes||'';document.getElementById('m-add').classList.add('open');
}

async function save(){
  const name=document.getElementById('f-name').value.trim();
  const loc=document.getElementById('f-loc').value.trim();
  if(!name||!loc){toast('Name and Location required','error');return;}
  const btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Saving...';
  const payload={id:editId||Date.now().toString(),name,location:loc,type:document.getElementById('f-type').value,status:document.getElementById('f-status').value,price:document.getElementById('f-price').value.trim(),period:document.getElementById('f-period').value,beds:document.getElementById('f-beds').value.trim(),size:document.getElementById('f-size').value.trim(),agent:document.getElementById('f-agent').value.trim(),phone:document.getElementById('f-phone').value.trim(),notes:document.getElementById('f-notes').value.trim(),date:new Date().toISOString().split('T')[0],action:editId?'edit':'add'};
  try{const r=await callAPI(payload);if(r.success){toast(editId?'Listing updated ✓':'Listing added ✓','success');closeM('m-add');await load();}else toast('Error saving','error');}catch{toast('Connection error','error');}
  btn.disabled=false;btn.textContent='Save Listing';
}

async function del(id){
  if(!confirm('Remove this listing?'))return;
  try{const r=await callAPI({action:'delete',id});if(r.success){toast('Listing removed','success');await load();}else toast('Could not delete','error');}catch{toast('Connection error','error');}
}

function view(id){
  const l=data.find(x=>String(x.id)===String(id));if(!l)return;
  document.getElementById('v-title').textContent=l.name||'Property Details';
  document.getElementById('v-body').innerHTML=`
    <div class="drow"><span class="dlabel">Location</span><span class="dval">${l.location||'—'}</span></div>
    <div class="drow"><span class="dlabel">Type</span><span class="dval">${tBadge(l.type)}</span></div>
    <div class="drow"><span class="dlabel">Status</span><span class="dval">${sBadge(l.status)}</span></div>
    <div class="drow"><span class="dlabel">Price</span><span class="dval" style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--primary)">₦${l.price||'—'}<span style="font-size:9px;color:var(--text-4);margin-left:6px">${l.period||''}</span></span></div>
    <div class="drow"><span class="dlabel">Bedrooms</span><span class="dval">${l.beds||'—'}</span></div>
    <div class="drow"><span class="dlabel">Size</span><span class="dval">${l.size||'—'}</span></div>
    <div class="drow"><span class="dlabel">Agent</span><span class="dval">${l.agent||'—'}</span></div>
    <div class="drow"><span class="dlabel">Phone</span><span class="dval">${l.phone||'—'}</span></div>
    <div class="drow"><span class="dlabel">Listed</span><span class="dval">${fmtDate(l.date)}</span></div>
    ${l.notes?`<div class="drow"><span class="dlabel">Notes</span><span class="dval" style="max-width:65%;text-align:right;color:var(--text-2);font-size:11px">${l.notes}</span></div>`:''}
  `;
  document.getElementById('m-view').classList.add('open');
}

function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});

load();
</script>
</body>
</html>
